version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd frontend
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: frontend/dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend
    # Aquí definimos la variable para que AWS la inyecte al construir
    environmentVariables:
      VITE_API_URL: "http://proyectoskyship-env.c3p3k9z6.us-west-1.elasticbeanstalk.com"
